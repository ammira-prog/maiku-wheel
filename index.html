<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Emergency Comfort RNG</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;height:100vh;background:#000;color:#fff;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
}
.wrap{width:min(560px,92vw);text-align:center;padding:18px 14px}
.title{font-weight:900;font-size:clamp(1.4rem,4.2vw,2.1rem)}
.sub{opacity:.75;margin-top:6px;font-size:clamp(.9rem,3vw,1.05rem)}

.wheel-area{margin-top:18px;display:flex;align-items:center;justify-content:center;position:relative}

.wheel{
  width:min(340px,78vw);
  height:min(340px,78vw);
  border-radius:50%;
  border:6px solid rgba(255,255,255,.18);
  box-shadow:0 0 24px rgba(255,255,255,.08);
  background:
    conic-gradient(
      #ffcccc 0deg 45deg,
      #ccccff 45deg 90deg,
      #ccffff 90deg 135deg,
      #ffcccc 135deg 180deg,
      #ccccff 180deg 225deg,
      #ccffff 225deg 270deg,
      #ffcccc 270deg 315deg,
      #ccccff 315deg 360deg
    );
  transition:transform 3.6s cubic-bezier(.12,.9,.15,1);
}

.cap{
  position:absolute;width:34%;height:34%;
  border-radius:50%;background:rgba(0,0,0,.78);
  border:4px solid rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;text-transform:uppercase;
}

.pointer{
  position:absolute;top:-6px;
  border-left:14px solid transparent;
  border-right:14px solid transparent;
  border-bottom:26px solid #22c55e;
}

.controls{margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
button{
  border:none;border-radius:12px;padding:12px 16px;
  font-weight:900;cursor:pointer;background:#22c55e;color:#000;
}
button.secondary{
  background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.18);
}
button:disabled{opacity:.55;cursor:not-allowed}

.result{
  margin-top:16px;padding:14px;border-radius:14px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.14);
  text-align:left;min-height:92px;
}
.result h3{margin:0 0 6px 0;font-size:1.05rem}
.result p{margin:0;opacity:.9;line-height:1.45}
.tag{
  display:inline-block;margin-top:10px;padding:4px 10px;
  border-radius:999px;font-size:.85rem;font-weight:900;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.16);
}

.fx{position:fixed;inset:0;pointer-events:none}
.spark{
  position:absolute;width:8px;height:8px;border-radius:50%;
  transform:translate(-50%,-50%);
  animation:pop 700ms ease-out forwards;
}
@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(.7);opacity:.9}
  100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0);opacity:0}
}
</style>
</head>
<body>
<div class="fx" id="fx"></div>

<div class="wrap">
  <div class="title">maiku’s emergency comfort rng</div>
  <div class="sub">rng may be biased in mira’s favor 😏</div>

  <div class="wheel-area">
    <div class="pointer"></div>
    <div class="wheel" id="wheel">
      <div class="cap">spin</div>
    </div>
  </div>

  <div class="controls">
    <button id="spinBtn">🎡 spin</button>
    <button class="secondary" id="soundBtn">🔊 sound: off</button>
  </div>

  <div class="result" id="resultBox">
    <h3>result:</h3>
    <p>press spin to roll your comfort buff.</p>
    <span class="tag" id="rarityTag">common</span>
  </div>
</div>

<script>
const outcomes = [
 {title:"🍫 snack buff activated",text:"+10 mood. go grab something sweet.",rarity:"common"},
 {title:"🎧 5-minute reset",text:"pause. breathe. you’re doing better than you think.",rarity:"common"},
 {title:"🧃 hydration check",text:"mira suspects dehydration. confirm with water 😌",rarity:"common"},
 {title:"🧠 overthinking nerfed",text:"debuff removed. you’re fine. proceed.",rarity:"common"},
 {title:"💪 main character energy",text:"walk like the protagonist you are.",rarity:"uncommon"},
 {title:"😏 minor distraction",text:"you just thought about mira. this was intentional.",rarity:"uncommon"},
 {title:"🫠 soft mode",text:"90% is already impressive. be kind to you.",rarity:"uncommon"},
 {title:"🎮 rare drop!",text:"+1 mira forehead kiss (absorbs 10% stress). redeemable anytime 😙",rarity:"rare"}
];

const wheel=document.getElementById("wheel");
const spinBtn=document.getElementById("spinBtn");
const resultBox=document.getElementById("resultBox");
const rarityTag=document.getElementById("rarityTag");
const fx=document.getElementById("fx");

let spinning=false;
let rotation=0;

function burst(x,y,count=20){
 const colors=['#ccccff','#ffcccc','#ccffff','#ffcccc','#ccccff'];
 for(let i=0;i<count;i++){
  const d=document.createElement("div");
  d.className="spark";
  d.style.left=x+"px";
  d.style.top=y+"px";
  d.style.background=colors[Math.floor(Math.random()*colors.length)];
  d.style.setProperty("--dx",(Math.random()*2-1)*120+"px");
  d.style.setProperty("--dy",(Math.random()*2-1)*120+"px");
  fx.appendChild(d);
  d.addEventListener("animationend",()=>d.remove());
 }
}

spinBtn.addEventListener("click",()=>{
 if(spinning) return;
 spinning=true;
 spinBtn.disabled=true;

 const sliceDeg=360/outcomes.length;
 const idx=Math.floor(Math.random()*outcomes.length); // EXACT 1/8 chance
 const targetCenter=idx*sliceDeg + sliceDeg/2;
 const extraSpins=6*360;
 rotation+=extraSpins + (360-targetCenter);

 wheel.style.transform=`rotate(${rotation}deg)`;

 setTimeout(()=>{
  const out=outcomes[idx];
  resultBox.querySelector("h3").textContent="result: "+out.title;
  resultBox.querySelector("p").textContent=out.text;
  rarityTag.textContent=out.rarity;

  if(out.rarity==="rare"){
   rarityTag.style.background="rgba(34,197,94,.15)";
   rarityTag.style.borderColor="rgba(34,197,94,.6)";
   burst(window.innerWidth/2,window.innerHeight/2,40);
  }else{
   rarityTag.style.background="rgba(255,255,255,.10)";
   rarityTag.style.borderColor="rgba(255,255,255,.16)";
   burst(window.innerWidth/2,window.innerHeight/2,20);
  }

  spinning=false;
  spinBtn.disabled=false;
 },3700);
});
</script>
</body>
</html>
